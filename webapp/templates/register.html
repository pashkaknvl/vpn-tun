<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN-TUN — Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="card">
        <h1 class="wordmark">VPN<span class="accent">-TUN</span><span class="caret"></span></h1>
        <p class="eyebrow">// create tunnel account</p>

        {% if error %}
            <div class="error">⚠ {{ error }}</div>
        {% endif %}

        <form action="{{ url_for('register') }}" method="POST">
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username"
                       placeholder="Choose a username" autocomplete="username" required>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       placeholder="Choose a password" autocomplete="new-password" required>
            </div>

            <button type="submit" class="btn">Create account</button>
        </form>

        <p class="switch">Already registered?
            <a href="{{ url_for('login') }}">Log in</a>
        </p>
    </div>
</body>
</html>
